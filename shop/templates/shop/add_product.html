<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة منتج جديد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .form-container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-save { background-color: #ff9900; color: white; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="form-container">
        <h3 class="text-center mb-4 border-bottom pb-2">إضافة منتج للمتجر</h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-save mt-3">حفظ ونشر المنتج</button>
        </form>
        <div class="text-center mt-3">
            <a href="/" class="text-decoration-none text-muted small">← العودة للرئيسية</a>
        </div>
    </div>
</body>
</html>
