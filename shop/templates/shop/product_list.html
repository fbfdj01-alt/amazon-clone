<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الاحترافي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card { transition: transform 0.3s; border: none; border-radius: 15px; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .product-img { height: 250px; object-fit: cover; width: 100%; background-color: #f8f9fa; }
        .price-badge { font-size: 1.2rem; color: #B12704; font-weight: bold; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="display-5 fw-bold text-dark">منتجاتي المميزة</h1>
            <a href="/add/" class="btn btn-success btn-lg shadow-sm">+ إضافة منتج</a>
        </div>

        <div class="row g-4">
            {% for product in products %}
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm product-card">
                    {% if product.image %}
                        <img src="{{ product.image.url }}" class="card-img-top product-img" alt="{{ product.title }}">
                    {% else %}
                        <div class="product-img d-flex align-items-center justify-content-center text-muted">لا توجد صورة</div>
                    {% endif %}
                    
                    <div class="card-body d-flex flex-column">
                        <h4 class="card-title fw-bold text-truncate">{{ product.title }}</h4>
                        <p class="card-text text-muted flex-grow-1">{{ product.description|truncatewords:15 }}</p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="price-badge">{{ product.price }} $</span>
                            <div class="btn-group">
                                <a href="/edit/{{ product.pk }}/" class="btn btn-outline-warning btn-sm px-3">تعديل</a>
                                <a href="/delete/{{ product.pk }}/" class="btn btn-outline-danger btn-sm px-3" onclick="return confirm('حذف المنتج؟')">حذف</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center py-5">
                <p class="fs-4 text-muted">لا يوجد منتجات حالياً، ابدأ بإضافة أول منتج!</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
